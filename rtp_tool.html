<!DOCTYPE html>
<html lang="zh-TW">
<head>

<title>RTP Respin 調整工具</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
  background: #0f1117;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 18px 22px;

/* ── Light theme ──────────────────────────── */
body[data-theme="light"] { background: #f5f6fb; color: #111827; }

body[data-theme="light"] .game-search { background: #f3f4ff; border-color: #9ca3c7; color: #111827; }
body[data-theme="light"] .game-list { background: #ffffff; border-color: #c4c9dd; }
body[data-theme="light"] .game-item:hover { background: #eef2ff; }
body[data-theme="light"] .game-item.active { background: #dbeafe; }
body[data-theme="light"] .fallback-upload { border-color: #c4c9dd; }
body[data-theme="light"] .fallback-upload:hover { border-color: #7eb8f7; }
body[data-theme="light"] .gr-display { background: #ffffff; border-color: #d0d4e5; }

body[data-theme="light"] tbody tr:hover td { background: #eef2ff; }
body[data-theme="light"] tbody tr.sum-row td { background: #e6ffed; color: #047857; }

body[data-theme="light"] .status-msg.error   { background: #fee2e2; color: #b91c1c; border-color: #fecaca; }
body[data-theme="light"] .status-msg.info    { background: #e0ecff; color: #1d4ed8; border-color: #bfdbfe; }
body[data-theme="light"] .respin-input { background: #f3f4ff; border-color: #9ca3c7; color: #111827; }
body[data-theme="light"] .seg-ctrl { border-left-color: #d0d4e5; }

body[data-theme="light"] .gr-detail .dv { color: #111827; }

body[data-theme="light"] .gvalue.dim { color: #111827; }

  background: #f3f4ff; border-color: #9ca3c7; color: #111827;
}
body[data-theme="light"] .cycle-tag { color: #374151; }
body[data-theme="light"] .theme-select { background: #e5e7f3; border-color: #c4c9dd; color: #111827; }

/* ── Cyberpunk 風 ─────────────────────────── */

body[data-theme="cyberpunk"] .game-picker-label { color: #a78bfa; }

body[data-theme="cyberpunk"] tbody tr:hover td { background: #1e0040; }
body[data-theme="cyberpunk"] tbody tr.sum-row td { background: #1a002e; color: #c084fc; }

body[data-theme="cyberpunk"] td.range-cell { color: #a78bfa; }

body[data-theme="cyberpunk"] .status-msg.error   { background: #2e0020; color: #f472b6; border-color: #9d174d; }

body[data-theme="cyberpunk"] .gvalue.neutral { color: #e879f9; }

body[data-theme="cyberpunk"] .cycle-input { background: #0a0014; border-color: #7c3aed; color: #e0d4ff; }
body[data-theme="cyberpunk"] .collapse-btn { border-color: #6b21a8; color: #a78bfa; }
body[data-theme="cyberpunk"] .collapse-btn:hover { background: #3b0764; color: #e879f9; }
body[data-theme="cyberpunk"] .btn-run {
  background: linear-gradient(135deg, #7c3aed, #e879f9);
  color: #fff;
  border: 1px solid #a855f7;
  box-shadow: 0 0 8px rgba(168,85,247,0.4);
  position: relative;
  overflow: hidden;
  z-index: 0;
}
body[data-theme="cyberpunk"] .btn-run::before {
  content: '';
  position: absolute;
  top: var(--glow-y, 50%);
  left: var(--glow-x, 50%);
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(232,121,249,0.55) 0%, transparent 70%);
  transform: translate(-50%, -50%);
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: -1;
}
body[data-theme="cyberpunk"] .btn-run:hover::before { opacity: 1; }
body[data-theme="cyberpunk"] .btn-run:hover {
  box-shadow: 0 0 18px rgba(168,85,247,0.6), 0 0 40px rgba(232,121,249,0.25);
  opacity: 1;
}
body[data-theme="cyberpunk"] .btn-dl {
  background: linear-gradient(135deg, #6b21a8, #a855f7);
  color: #fff;
  border: 1px solid #7c3aed;
  box-shadow: 0 0 8px rgba(107,33,168,0.4);
  position: relative;
  overflow: hidden;
  z-index: 0;
}
body[data-theme="cyberpunk"] .btn-dl::before {
  content: '';
  position: absolute;
  top: var(--glow-y, 50%);
  left: var(--glow-x, 50%);
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(168,85,247,0.55) 0%, transparent 70%);
  transform: translate(-50%, -50%);
  border-radius: 50%;

  opacity: 0;

  z-index: -1;
}

  box-shadow: 0 0 18px rgba(107,33,168,0.6), 0 0 40px rgba(168,85,247,0.25);
  opacity: 1;
}
body[data-theme="cyberpunk"] .btn-reset {
  background: #1a0038; color: #d0c4ee; border-color: #6b21a8;
  position: relative;
  overflow: hidden;
  z-index: 0;
}
body[data-theme="cyberpunk"] .btn-reset::before {
  content: '';
  position: absolute;
  top: var(--glow-y, 50%);
  left: var(--glow-x, 50%);
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(139,92,246,0.4) 0%, transparent 70%);
  transform: translate(-50%, -50%);
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;

}

  box-shadow: 0 0 12px rgba(107,33,168,0.5);
  opacity: 1;
}
body[data-theme="cyberpunk"] .theme-select { background: #1a0038; border-color: #7c3aed; color: #e0d4ff; }

/* ── Top Bar ──────────────────────────────── */
.top-bar {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 14px;
  margin-bottom: 14px;
  align-items: stretch;
}

/* ── Game Picker ─────────────────────────── */
.game-picker {
  background: #161b27;
  border: 1px solid #2a3550;
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
}
.game-picker-label { font-size: 0.72rem; color: #8899aa; text-transform: uppercase; letter-spacing: 0.5px; }
.game-search {
  background: #0f1117;
  border: 1px solid #3a4a6b;

<!-- ── Top Bar ─────────────────────────────── -->
<div class="top-bar">

<!-- ── Pooh GIF (only visible in pooh theme) ── -->

<script>
'use strict';

// ═══════════════════════════════════════════════
// Constants
// ═══════════════════════════════════════════════
const R_MIN = 0;
const R_MAX = 9999 / 10000;

// ═══════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════
// segments: [{ name, cycle, backupCycle, startCol, headers, rows, backupR, originalGR }]
// rows:     [{ rowIdx, rangeMin, rangeMax, avg, prob, respin, locked }]
let segments = [];
let wb        = null;
let fileName  = '';
let currentTheme = 'dark';

// ═══════════════════════════════════════════════
// Pure helpers
// ═══════════════════════════════════════════════
const clip    = (v, lo = 0, hi = 1) => Math.max(lo, Math.min(hi, v));
const fmt     = (v, d = 4) => Number(v).toFixed(d);
const fmtE    = (v, d = 3) => Number(v).toExponential(d);
const fmtPct  = v => (Number(v) * 100).toFixed(2) + '%';
const toX4    = v => Math.round(Number(v) * 10000);

function calcGR19(arr) {
  let num = 0, den = 0;
  arr.forEach(r => {
    const w = r.prob * (1 - r.respin);
    num += w * r.avg;
    den += w;
  });
  return den === 0 ? 0 : num / den;
}

function calcGR(r, denom) {
  return denom > 0 ? r.prob * (1 - r.respin) * r.avg / denom : 0;
}

function getDenom(arr) {
  return arr.reduce((s, r) => s + r.prob * (1 - r.respin), 0);
}

// ═══════════════════════════════════════════════
// Game Picker + Upload
// ═══════════════════════════════════════════════
let allGames       = [];   // game folder names from server
let selectedGame   = '';   // currently selected game name
let serverAvail    = false;

const fileInput = document.getElementById('file-input');
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

async function initGameList() {
  try {
    const resp = await fetch('/api/games');
    if (!resp.ok) throw new Error(resp.status);
    allGames    = await resp.json();
    serverAvail = true;
    renderGameList(allGames);
  } catch (_) {
    serverAvail = false;
  }
}

function renderGameList(list) {
  const el = document.getElementById('game-list');
  el.innerHTML = '';
  list.forEach(name => {
    const div = document.createElement('div');
    div.className = 'game-item' + (name === selectedGame ? ' active' : '');
    div.textContent = name;
    div.onclick = () => selectGame(name);
    el.appendChild(div);
  });
}

function openGameList() {
  if (!serverAvail || allGames.length === 0) return;
  document.getElementById('game-list').classList.add('open');
}

function filterGameList() {
  const q = document.getElementById('game-search').value.toLowerCase();
  const filtered = allGames.filter(n => n.toLowerCase().includes(q));
  renderGameList(filtered);
  document.getElementById('game-list').classList.add('open');
}

document.addEventListener('click', e => {
  const picker = document.getElementById('game-picker');
  if (!picker.contains(e.target)) {
    document.getElementById('game-list').classList.remove('open');
  }
});

async function selectGame(name) {
  document.getElementById('game-list').classList.remove('open');
  document.getElementById('game-search').value = '';
  selectedGame = name;
  document.getElementById('game-current').textContent = name + ' 載入中...';

  try {
    const resp = await fetch(`/api/games/${encodeURIComponent(name)}/latest`);
    if (!resp.ok) throw new Error('找不到 xlsx 檔案');
    const fnHeader = resp.headers.get('X-Filename');
    fileName = fnHeader ? decodeURIComponent(fnHeader) : (name + '.xlsx');
    const buf = await resp.arrayBuffer();
    wb = XLSX.read(new Uint8Array(buf), { type: 'array' });
    document.getElementById('game-current').textContent = name + ' — ' + fileName;
    parseSheet();
  } catch (err) {
    document.getElementById('game-current').textContent = name;
    setGlobalStatus('載入失敗：' + err.message, 'error');
  }
}

function loadFile(file) {
  fileName = file.name;
  selectedGame = '';
  document.getElementById('game-current').textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      wb = XLSX.read(ev.target.result, { type: 'array' });
      parseSheet();
    } catch (err) {
      setGlobalStatus('讀取 Excel 失敗：' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

initGameList();

// ═══════════════════════════════════════════════
// Parse Sheet — multi-segment
// Row 0: segment name cells (string) + cycle in adjacent cell
// Row 1: header labels (5 cols per segment)
// Row 2+: data rows (5 cols per segment)
// ═══════════════════════════════════════════════
function parseSheet() {
  const ws  = wb.Sheets[wb.SheetNames[0]];
  const ref = XLSX.utils.decode_range(ws['!ref']);

  const getCellVal = (r, c) => {
    const cell = ws[XLSX.utils.encode_cell({ r, c })];
    return cell != null ? cell.v : null;
  };
  const getCellStr = (r, c) => {
    const v = getCellVal(r, c);
    return (v != null && v !== '') ? String(v).trim() : null;
  };

  // ── Scan row 0 for segment names (must be string cells) ──
  const segmentMetas = [];
  for (let c = 0; c <= ref.e.c; c++) {
    const cell = ws[XLSX.utils.encode_cell({ r: 0, c })];
    if (!cell || cell.t !== 's') continue;
    const name = String(cell.v).trim();
    if (!name) continue;

    // Cycle: cell to the right (same row), must be a number >= 1
    const cycleVal = getCellVal(0, c + 1);
    const cycle = (typeof cycleVal === 'number' && cycleVal >= 1)
      ? Math.round(cycleVal) : 1;

    // Headers: row 1, cols c to c+4
    const headers = [];
    for (let hc = c; hc < c + 5; hc++) {
      headers.push(getCellStr(1, hc) || '');
    }

    segmentMetas.push({ name, cycle, startCol: c, headers });
  }

  if (segmentMetas.length === 0) {
    setGlobalStatus(
      '找不到有效的表格名稱，請確認 Excel 格式（第一列需含 MG/FG/BG 等表格名稱）。',
      'error'
    );
    return;
  }

  // ── Parse data rows for each segment (row 2 onwards) ──
  const safeN = v => (v == null || isNaN(+v)) ? 0 : +v;
  const newSegments = [];

  segmentMetas.forEach(meta => {
    const sRows = [];
    for (let r = 2; r <= ref.e.r; r++) {
      const c  = meta.startCol;
      const v0 = getCellVal(r, c);
      const v1 = getCellVal(r, c + 1);
      const v2 = getCellVal(r, c + 2);
      const v3 = getCellVal(r, c + 3);
      const v4 = getCellVal(r, c + 4);

      // Skip all-null rows
      if (v0 == null && v1 == null && v2 == null && v3 == null && v4 == null) continue;

      // Skip rows containing string cells (e.g. repeated header rows)
      if (typeof v0 === 'string' || typeof v1 === 'string' ||
          typeof v2 === 'string' || typeof v3 === 'string' || typeof v4 === 'string') continue;

      const avg  = safeN(v2);
      const prob = safeN(v3);
      let respin = safeN(v4);
      // Excel may store respin as raw (0.29) or ×10000 (2900); normalise
      if (respin > 1) respin = respin / 10000;

      sRows.push({
        rowIdx:   r + 1,          // 1-based Excel row number for write-back
        rangeMin: safeN(v0),
        rangeMax: safeN(v1),
        avg,
        prob,
        respin,
        locked:   false,
      });
    }

    // Drop trailing all-zero padding rows
    while (sRows.length > 0) {
      const last = sRows[sRows.length - 1];
      if (last.avg === 0 && last.prob === 0 && last.respin === 0) sRows.pop();
      else break;
    }

    if (sRows.length === 0) return;  // skip empty segments

    const backupR    = sRows.map(r => r.respin);
    const originalGR = calcGR19(sRows);

    // Auto-lock rows where respin is at its extremes
    sRows.forEach(r => { if (r.respin === 0 || r.respin === 1) r.locked = true; });

    newSegments.push({
      name:       meta.name,
      cycle:      meta.cycle,
      backupCycle: meta.cycle,
      startCol:   meta.startCol,
      headers:    meta.headers,
      rows:       sRows,
      backupR,
      originalGR,
    });
  });

  if (newSegments.length === 0) {
    setGlobalStatus('找不到有效資料列，請確認 Excel 格式。', 'error');
    return;
  }

  segments = newSegments;
  clearGlobalStatus();
  renderAllSegments();
  document.getElementById('dl-btn').classList.remove('hidden');
}

// ═══════════════════════════════════════════════
// Render All Segments
// ═══════════════════════════════════════════════
function renderAllSegments() {
  // Build top-bar segment GR blocks
  const segBlocks = document.getElementById('seg-gr-blocks');
  segBlocks.innerHTML = '';
  segments.forEach((seg, si) => {
    const sep = document.createElement('div');
    sep.className = 'gr-sep';
    segBlocks.appendChild(sep);

    const block = document.createElement('div');
    block.className = 'gr-block';
    block.innerHTML = `
      <span class="glabel">${seg.name}</span>
      <span class="gvalue dim" id="gr-seg-${si}">—</span>
    `;
    segBlocks.appendChild(block);
  });

  // Build segment cards
  const container = document.getElementById('segments-container');
  container.innerHTML = '';
  segments.forEach((seg, si) => {
    const card = buildSegmentCard(seg, si);
    container.appendChild(card);
    makeCollapsible(`seg-hdr-${si}`, `seg-body-${si}`, `seg-btn-${si}`);
    renderSegmentRows(si);

    // Update top GR block for this segment
    const gr19  = calcGR19(seg.rows);
    const topEl = document.getElementById(`gr-seg-${si}`);
    if (topEl) { topEl.textContent = fmtPct(gr19 / seg.cycle); topEl.className = 'gvalue neutral'; }
  });

  recalcTotalGR();
}

function buildSegmentCard(seg, si) {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `seg-card-${si}`;

  // Build header cell text from Excel headers (fallback to defaults)
  const h0 = seg.headers[0] || '下限';
  const h1 = seg.headers[1] || '上限';
  const h2 = seg.headers[2] || '平均倍率';
  const h3 = seg.headers[3] || '機率';

  card.innerHTML = `
    <div class="card-header" id="seg-hdr-${si}">
      <div style="display:flex;align-items:center;" onclick="event.stopPropagation()">
        <h2 style="cursor:pointer" onclick="document.getElementById('seg-hdr-${si}').click()">${seg.name}</h2>
        <span class="cycle-tag">週期</span>
        <input class="cycle-input" id="seg-cycle-${si}" type="number"
          value="${seg.cycle}" min="1" step="1"
          title="週期：調整後所有 GR 顯示會除以此值"
          oninput="onCycleChange(${si}, this.value)">
        <span class="cycle-tag">局</span>
        <span class="badge">${seg.rows.length} 列</span>
      </div>
      <button class="collapse-btn" id="seg-btn-${si}">收合 ▲</button>
    </div>
    <div class="card-body" id="seg-body-${si}">
      <div class="seg-body-wrap">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>${h0}</th>
                <th>${h1}</th>
                <th>${h2}</th>
                <th>${h3}</th>
                <th>重轉機率 / 10000<span class="sub">可調整</span></th>
                <th>GR<span class="sub">per cycle</span></th>
              </tr>
            </thead>
            <tbody id="seg-tbody-${si}"></tbody>
          </table>
        </div>
        <div class="seg-ctrl">
          <div class="input-group">
            <label>目標 GR（%）</label>
            <input type="number" id="seg-target-${si}" placeholder="例：97" step="0.01" min="0">
          </div>
          <button class="btn btn-run" onclick="runOptimizeForSegment(${si})">▶ 執行調整</button>
          <button class="btn btn-reset" onclick="resetSegmentRespin(${si})">↺ 還原重轉</button>
          <div class="status-msg" id="seg-status-${si}"></div>
        </div>
      </div>
    </div>
  `;
  return card;
}

// ═══════════════════════════════════════════════
// Render rows for a single segment
// ═══════════════════════════════════════════════
function renderSegmentRows(si) {
  const seg   = segments[si];
  const tbody = document.getElementById(`seg-tbody-${si}`);
  tbody.innerHTML = '';

  const denom = getDenom(seg.rows);
  seg.rows.forEach((row, idx) => {
    const gr = calcGR(row, denom);
    const tr = document.createElement('tr');
    tr.id = `seg-${si}-tr-${idx}`;
    tr.innerHTML = `
      <td>${row.rowIdx}</td>
      <td class="range-cell">${row.rangeMin}</td>
      <td class="range-cell">${row.rangeMax}</td>
      <td>${fmt(row.avg)}</td>
      <td>${fmtPct(row.prob)}</td>
      <td class="respin-cell">
        <div class="respin-wrap">
          <input class="respin-input" id="seg-${si}-ri-${idx}" type="number"
            value="${toX4(row.respin)}" step="1" min="0" max="9999"
            onchange="onRespinChange(${si}, ${idx}, this.value)"
            title="重轉機率（×10000），範圍 1~9999">
          <button class="lock-btn" id="seg-${si}-lb-${idx}"
            onclick="toggleLock(${si}, ${idx})"
            title="鎖定後不被演算法調整">🔓</button>
        </div>
      </td>
      <td id="seg-${si}-grval-${idx}">${fmtPct(gr / seg.cycle)}</td>
    `;
    tbody.appendChild(tr);
    if (row.locked) applyLockUIForSeg(si, idx, true);
  });

  // Sum row
  const gr19    = calcGR19(seg.rows);
  const sumProb = seg.rows.reduce((s, r) => s + r.prob, 0);
  const trS = document.createElement('tr');
  trS.className = 'sum-row';
  trS.innerHTML = `
    <td>Σ</td>
    <td>—</td><td>—</td><td>—</td>
    <td>${fmtPct(sumProb)}</td>
    <td>—</td>
    <td id="seg-${si}-sum-gr" class="cell-grval">${fmtPct(gr19 / seg.cycle)}</td>
  `;
  tbody.appendChild(trS);
}

// ═══════════════════════════════════════════════
// Refresh GR column + top block for one segment
// ═══════════════════════════════════════════════
function refreshSegmentGR(si) {
  const seg   = segments[si];
  const denom = getDenom(seg.rows);

  seg.rows.forEach((row, idx) => {
    const el = document.getElementById(`seg-${si}-grval-${idx}`);
    if (el) el.textContent = fmtPct(calcGR(row, denom) / seg.cycle);
  });

  const gr19  = calcGR19(seg.rows);
  const sumEl = document.getElementById(`seg-${si}-sum-gr`);
  if (sumEl) sumEl.textContent = fmtPct(gr19 / seg.cycle);

  const topEl = document.getElementById(`gr-seg-${si}`);
  if (topEl) { topEl.textContent = fmtPct(gr19 / seg.cycle); topEl.className = 'gvalue neutral'; }

  recalcTotalGR();
}

// ═══════════════════════════════════════════════
// Total GR  (sum of each segment's GR/cycle)
// ═══════════════════════════════════════════════
function recalcTotalGR() {
  let total = 0;
  segments.forEach(seg => { total += calcGR19(seg.rows) / seg.cycle; });
  const el = document.getElementById('gr-total');
  if (el) { el.textContent = fmtPct(total); el.className = 'gvalue'; }
}

// ═══════════════════════════════════════════════
// Respin change & Lock
// ═══════════════════════════════════════════════
function onRespinChange(si, idx, val) {
  const seg = segments[si];
  const x4  = parseFloat(val);
  if (isNaN(x4) || x4 < 0 || x4 >= 10000) {
    setSegStatus(si, '重轉機率（×10000）必須在 1 ~ 9999 之間（不含 0 和 10000）', 'error');
    const inp = document.getElementById(`seg-${si}-ri-${idx}`);
    if (inp) inp.value = toX4(seg.rows[idx].respin);
    return;
  }
  seg.rows[idx].respin = x4 / 10000;
  refreshSegmentGR(si);
}

function toggleLock(si, idx) {
  const seg = segments[si];
  seg.rows[idx].locked = !seg.rows[idx].locked;
  applyLockUIForSeg(si, idx, seg.rows[idx].locked);
}

function applyLockUIForSeg(si, idx, locked) {
  const inp = document.getElementById(`seg-${si}-ri-${idx}`);
  const btn = document.getElementById(`seg-${si}-lb-${idx}`);
  if (locked) {
    if (inp) inp.disabled = true;
    if (btn) { btn.textContent = '🔒'; btn.style.color = '#f7a07e'; btn.title = '此列已鎖定，演算法不會調整'; }
  } else {
    if (inp) inp.disabled = false;
    if (btn) { btn.textContent = '🔓'; btn.style.color = ''; btn.title = '鎖定後不被演算法調整'; }
  }
}

// ═══════════════════════════════════════════════
// Reset one segment
// ═══════════════════════════════════════════════
function resetSegmentRespin(si) {
  const seg = segments[si];
  seg.rows.forEach((r, i) => { r.respin = seg.backupR[i]; });
  seg.rows.forEach((r, i) => {
    const inp = document.getElementById(`seg-${si}-ri-${i}`);
    if (inp) inp.value = toX4(seg.backupR[i]);
  });
  seg.cycle = seg.backupCycle;
  const cycleInp = document.getElementById(`seg-cycle-${si}`);
  if (cycleInp) cycleInp.value = seg.backupCycle;
  refreshSegmentGR(si);
  setSegStatus(si, '重轉機率與週期已還原至原始數值。', 'info');
}

// ═══════════════════════════════════════════════
// Cycle change
// ═══════════════════════════════════════════════
function onCycleChange(si, val) {
  let v = parseInt(val, 10);
  if (isNaN(v) || v < 1) v = 1;
  segments[si].cycle = v;
  const inp = document.getElementById(`seg-cycle-${si}`);
  if (inp) inp.value = v;
  refreshSegmentGR(si);
}

// ═══════════════════════════════════════════════
// Collapse
// ═══════════════════════════════════════════════
function makeCollapsible(hId, bId, btnId) {
  const hdr = document.getElementById(hId);
  if (!hdr) return;
  hdr.addEventListener('click', () => {
    const b   = document.getElementById(bId);
    const btn = document.getElementById(btnId);
    b.classList.toggle('collapsed');
    btn.textContent = b.classList.contains('collapsed') ? '展開 ▼' : '收合 ▲';
  });
}

// ═══════════════════════════════════════════════
// Optimizer — Binary Search on Δ (per segment)
// ═══════════════════════════════════════════════
function runOptimizeForSegment(si) {
  const seg = segments[si];

  // Sync cycle from input field — onchange may not have fired if user clicked
  // the button immediately after typing without leaving the field first
  const cycleEl = document.getElementById(`seg-cycle-${si}`);
  if (cycleEl) {
    const v = parseInt(cycleEl.value, 10);
    if (!isNaN(v) && v >= 1) seg.cycle = v;
    else cycleEl.value = seg.cycle;
  }

  // Reset to original respin values before optimising
  seg.rows.forEach((r, i) => { r.respin = seg.backupR[i]; });
  seg.rows.forEach((r, i) => {
    const inp = document.getElementById(`seg-${si}-ri-${i}`);
    if (inp) inp.value = toX4(seg.backupR[i]);
  });

  const targetPct = parseFloat(document.getElementById(`seg-target-${si}`).value);
  if (isNaN(targetPct) || targetPct <= 0) {
    setSegStatus(si, '請輸入有效的目標 GR 值（百分比，如 97 表示 97%）', 'error');
    return;
  }
  // target = 週期總 GR
  const target = (targetPct / 100) * seg.cycle;

  const unlocked = seg.rows.filter(r => !r.locked);
  if (unlocked.length === 0) {
    setSegStatus(si, '所有列都已鎖定，無法調整。請解鎖至少一列。', 'error');
    return;
  }

  const baseR = seg.rows.map(r => r.respin);

  // GR as a function of global delta Δ
  function gr19ofD(d) {
    const snap = seg.rows.map((r, i) => ({
      avg:    r.avg,
      prob:   r.prob,
      respin: r.locked ? baseR[i] : clip(baseR[i] + d, R_MIN, R_MAX),
    }));
    return calcGR19(snap) * seg.cycle;
  }

  // Bracket scan: find the smallest Δ range that brackets target
  const baseG = gr19ofD(0);
  let gMin = baseG, gMax = baseG;
  let bracketLo = 0, bracketHi = 0;
  let foundBracket = false;

  for (let step = 0.01; step <= 1.0; step *= 2) {
    for (const d of [-step, step]) {
      const g = gr19ofD(d);
      if (g < gMin) { gMin = g; bracketLo = d; }
      if (g > gMax) { gMax = g; bracketHi = d; }
    }
    if (target >= gMin - 1e-9 && target <= gMax + 1e-9) { foundBracket = true; break; }
  }

  if (!foundBracket) {
    setSegStatus(si,
      `目標 ${fmtPct(target / seg.cycle)} 超出可調整範圍 ` +
      `[${fmtPct(gMin / seg.cycle)}, ${fmtPct(gMax / seg.cycle)}]。` +
      `目前 GR = ${fmtPct(baseG / seg.cycle)}`,
      'error'
    );
    return;
  }

  const decreasing = gr19ofD(bracketHi) < gr19ofD(bracketLo);
  let lo = bracketLo, hi = bracketHi, delta = 0;

  for (let i = 0; i < 300; i++) {
    const mid = (lo + hi) / 2;
    const g   = gr19ofD(mid);
    if (Math.abs(g - target) < 1e-12) { delta = mid; break; }
    if (decreasing ? g > target : g < target) lo = mid;
    else hi = mid;
    delta = mid;
    if (Math.abs(hi - lo) < 1e-13) break;
  }

  const newR       = seg.rows.map((r, i) => r.locked ? baseR[i] : clip(baseR[i] + delta, R_MIN, R_MAX));
  const gr19New    = calcGR19(seg.rows.map((r, i) => ({ avg: r.avg, prob: r.prob, respin: newR[i] }))) * seg.cycle;
  const err        = Math.abs(gr19New - target);
  const ok         = err < 1e-4;

  // Persist new respin values
  seg.rows.forEach((r, i) => { r.respin = newR[i]; });
  seg.rows.forEach((r, i) => {
    const inp = document.getElementById(`seg-${si}-ri-${i}`);
    if (inp) inp.value = toX4(r.respin);
  });

  refreshSegmentGR(si);

  setSegStatus(si,
    `調整完成！GR = ${fmtPct(gr19New / seg.cycle)}，` +
    `目標 = ${fmtPct(target / seg.cycle)}，誤差 = ${fmtE(err)}`,
    ok ? 'success' : 'info'
  );
}

// ═══════════════════════════════════════════════
// Save / Download Excel
// ═══════════════════════════════════════════════
function makeTimestamp() {
  const now = new Date();
  return String(now.getFullYear()) +
    String(now.getMonth() + 1).padStart(2, '0') +
    String(now.getDate()).padStart(2, '0') +
    String(now.getHours()).padStart(2, '0') +
    String(now.getMinutes()).padStart(2, '0');
}

function prepareWbForSave() {
  if (!wb) return;
  const ws = wb.Sheets[wb.SheetNames[0]];
  segments.forEach(seg => {
    const respinCol = seg.startCol + 4;
    seg.rows.forEach(row => {
      const addr = XLSX.utils.encode_cell({ r: row.rowIdx - 1, c: respinCol });
      const x4val = toX4(row.respin);
      if (ws[addr]) { ws[addr].v = x4val; ws[addr].t = 'n'; delete ws[addr].f; }
      else ws[addr] = { v: x4val, t: 'n' };
    });
  });
}

async function saveExcel() {
  if (!wb) return;
  prepareWbForSave();
  const ts = makeTimestamp();

  // If we have a selected game and server is available, save to server
  if (selectedGame && serverAvail) {
    const outName = selectedGame + '_' + ts + '.xlsx';
    const wbout   = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    try {
      const resp = await fetch(
        `/api/games/${encodeURIComponent(selectedGame)}/save?filename=${encodeURIComponent(outName)}`,
        { method: 'POST', body: new Uint8Array(wbout) }
      );
      if (!resp.ok) throw new Error('Server error ' + resp.status);
      const result = await resp.json();
      setGlobalStatus('已儲存：' + result.path, 'success');
    } catch (err) {
      setGlobalStatus('儲存失敗：' + err.message + '，改為瀏覽器下載', 'error');
      fallbackDownload(ts);
    }
  } else {
    fallbackDownload(ts);
  }
}

function fallbackDownload(ts) {
  const baseName = selectedGame || fileName.replace(/\.xlsx?$/i, '');
  const outName  = baseName + '_' + ts + '.xlsx';
  XLSX.writeFile(wb, outName);
  setGlobalStatus('已下載：' + outName, 'success');
}

// ═══════════════════════════════════════════════
// Status helpers
// ═══════════════════════════════════════════════
function setSegStatus(si, msg, type) {
  const el = document.getElementById(`seg-status-${si}`);
  if (el) { el.textContent = msg; el.className = 'status-msg ' + type; }
}

function setGlobalStatus(msg, type) {
  const el = document.getElementById('global-status');
  if (!el) return;
  el.textContent = msg;
  el.className   = 'status-msg ' + type;
  el.style.display = 'block';
}

function clearGlobalStatus() {
  const el = document.getElementById('global-status');
  if (el) { el.textContent = ''; el.className = 'status-msg'; el.style.display = 'none'; }
}

// ═══════════════════════════════════════════════
// Theme
// ═══════════════════════════════════════════════
const VALID_THEMES = ['dark','light','cyberpunk','green','pooh'];
const POOH_GIFS = ['resoruce/pooh_1.gif','resoruce/pooh_2.gif','resoruce/pooh_3.gif'];
let poohTimer = null;

function randomPoohGif() {
  return POOH_GIFS[Math.floor(Math.random() * POOH_GIFS.length)];
}

function startPoohGif() {
  const wrap = document.getElementById('pooh-gif-wrap');
  const img  = document.getElementById('pooh-gif');
  if (!wrap || !img) return;
  img.src = randomPoohGif();
  wrap.classList.add('visible');
  poohTimer = setInterval(() => { img.src = randomPoohGif(); }, 10000);
}

function stopPoohGif() {
  const wrap = document.getElementById('pooh-gif-wrap');
  if (wrap) wrap.classList.remove('visible');
  if (poohTimer) { clearInterval(poohTimer); poohTimer = null; }
}

function applyTheme(theme) {
  if (!VALID_THEMES.includes(theme)) theme = 'dark';
  currentTheme = theme;
  document.body.dataset.theme = theme;
  const sel = document.getElementById('theme-select');
  if (sel) sel.value = theme;
  try { localStorage.setItem('rtp_theme', theme); } catch (_) {}
  if (theme === 'pooh') startPoohGif(); else stopPoohGif();
}

function initTheme() {
  let theme = 'dark';
  try {
    const saved = localStorage.getItem('rtp_theme');
    if (VALID_THEMES.includes(saved)) theme = saved;
  } catch (_) { theme = 'dark'; }
  applyTheme(theme);
}

initTheme();

// ═══════════════════════════════════════════════
// Cyberpunk button glow tracking
// ═══════════════════════════════════════════════
document.addEventListener('mousemove', function(e) {
  if (currentTheme !== 'cyberpunk') return;
  const btn = e.target.closest('.btn');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  btn.style.setProperty('--glow-x', (e.clientX - rect.left) + 'px');
  btn.style.setProperty('--glow-y', (e.clientY - rect.top) + 'px');
});
</script>
