<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTP Respin 調整工具</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/themes.css">
</head>
<body>

<!-- ── Top Bar ─────────────────────────────── -->
<div class="top-bar">
  <div class="game-picker" id="game-picker">
    <div class="game-picker-label">選擇遊戲</div>
    <input type="text" class="game-search" id="game-search"
      placeholder="搜尋遊戲..." autocomplete="off"
      onfocus="openGameList()" oninput="filterGameList()">
    <label class="extra-toggle" id="extra-toggle">
      <input type="checkbox" id="extra-cb" disabled onchange="onExtraToggle()">
      <span>額外</span>
    </label>
    <div class="game-current" id="game-current">尚未載入</div>
    <div class="game-list" id="game-list"></div>
    <div class="fallback-upload" id="fallback-upload" onclick="document.getElementById('file-input').click()"
      ondragover="event.preventDefault(); this.style.borderColor='#7eb8f7';"
      ondragleave="this.style.borderColor='';"
      ondrop="event.preventDefault(); this.style.borderColor=''; if(event.dataTransfer.files[0]) loadFile(event.dataTransfer.files[0]);">
      或 拖放 / 點擊上傳 .xlsx
    </div>
    <input type="file" id="file-input" accept=".xlsx,.xls">
  </div>

  <div class="gr-display">
    <div class="gr-block" id="total-gr-block">
      <span class="glabel">Total</span>
      <span class="gvalue total-gr" id="gr-total">—</span>
    </div>
    <!-- Segment GR blocks injected by JS -->
    <div id="seg-gr-blocks"></div>
    <div class="top-actions">
      <button class="btn btn-dl hidden" id="dl-btn" onclick="saveExcel()">💾 儲存更新</button>
      <select class="theme-select" id="theme-select" onchange="applyTheme(this.value)">
        <option value="dark">🌙 暗色版</option>
        <option value="light">☀️ 亮色版</option>
        <option value="cyberpunk">🌆 Cyberpunk</option>
        <option value="green">🌿 清新綠</option>
        <option value="pooh">🍯 小熊維尼</option>
      </select>
    </div>
  </div>
</div>

<!-- ── Global status ──────────────────────── -->
<div class="status-msg" id="global-status"></div>

<!-- ── Segment Cards (rendered by JS) ────── -->
<div id="segments-container"></div>

<!-- ── Pooh GIF (only visible in pooh theme) ── -->
<div class="pooh-gif-wrap" id="pooh-gif-wrap">
  <img id="pooh-gif" src="" alt="Pooh">
</div>

<!--
  JS load order — DO NOT reorder. Dependency chain:
  1. helpers.js       — all shared state + pure functions (no deps)
  2. save.js          — status helpers + save logic (← helpers)
  3. segment-ctrl.js  — GR refresh, lock, cycle (← helpers, save)
  4. renderer.js      — build cards & rows (← helpers, segment-ctrl)
  5. parser.js        — Excel parsing (← helpers, save, renderer)
  6. game-picker.js   — game list, upload (← helpers, save, parser)
  7. optimizer.js     — binary search (← helpers, save, segment-ctrl)
  8. theme.js         — theme init + effects (← helpers) [runs immediately]
-->
<script src="js/helpers.js"></script>
<script src="js/save.js"></script>
<script src="js/segment-ctrl.js"></script>
<script src="js/renderer.js"></script>
<script src="js/parser.js"></script>
<script src="js/game-picker.js"></script>
<script src="js/optimizer.js"></script>
<script src="js/theme.js"></script>
</body>
</html>
