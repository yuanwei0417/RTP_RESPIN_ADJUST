<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTP Respin 調整工具</title>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
  background: #0f1117;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 18px 22px;
}

/* ── Top Bar ──────────────────────────────── */
.top-bar {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 14px;
  margin-bottom: 14px;
  align-items: stretch;
}

#upload-area {
  border: 2px dashed #3a4a6b;
  border-radius: 10px;
  padding: 12px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: #161b27;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
#upload-area:hover, #upload-area.drag-over { border-color: #7eb8f7; background: #1a2235; }
#upload-area .up-icon { font-size: 1.5rem; }
#upload-area p { color: #8899aa; font-size: 0.8rem; }
#upload-area p span { color: #7eb8f7; font-weight: 600; }
#file-name { font-size: 0.73rem; color: #5566aa; margin-top: 1px; }
#file-input { display: none; }

/* GR Display */
.gr-display {
  background: #161b27;
  border: 1px solid #2a3550;
  border-radius: 10px;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 36px;
  flex-wrap: wrap;
}
.gr-block { display: flex; flex-direction: column; gap: 4px; }
.gr-block .glabel {
  font-size: 0.72rem; color: #8899aa;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.gr-block .gvalue {
  font-size: 2.1rem; font-weight: 800;
  letter-spacing: 1px; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.gvalue.good    { color: #5ef77a; }
.gvalue.neutral { color: #7eb8f7; }
.gvalue.dim     { color: #445566; }
.gr-sep { width: 1px; height: 46px; background: #2a3550; }
.gr-detail { display: flex; flex-direction: column; gap: 5px; }
.gr-detail .drow { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
.gr-detail .drow .dk { color: #6677aa; width: 56px; }
.gr-detail .drow .dv { color: #ccd6e8; font-weight: 600; }
.gr-detail .drow .dv.hi { color: #5ef77a; }

/* ── Card ────────────────────────────────── */
.card {
  background: #161b27;
  border: 1px solid #2a3550;
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  background: #1c2336; border-bottom: 1px solid #2a3550;
  cursor: pointer; user-select: none;
}
.card-header:hover { background: #212840; }
.card-header h2 { font-size: 0.88rem; font-weight: 600; color: #b0c4de; }
.card-header .badge {
  background: #263352; color: #7eb8f7;
  padding: 1px 8px; border-radius: 20px;
  font-size: 0.73rem; margin-left: 8px;
}
.collapse-btn {
  background: none; border: 1px solid #3a4a6b;
  color: #8899aa; border-radius: 5px;
  padding: 2px 8px; cursor: pointer; font-size: 0.78rem;
  transition: all 0.15s;
}
.collapse-btn:hover { background: #263352; color: #ccc; }
.card-body.collapsed { display: none; }

/* ── Split Table Layout ──────────────────── */
.split-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.split-pane { overflow-x: auto; max-height: 420px; overflow-y: auto; }
.split-pane:first-child { border-right: 2px solid #2a3550; }

/* ── Tables ──────────────────────────────── */
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }

thead th {
  position: sticky; top: 0;
  background: #1c2336; color: #7eb8f7;
  padding: 9px 10px;
  text-align: center;
  border-bottom: 2px solid #3a4a6b;
  border-right: 1px solid #263352;
  white-space: nowrap; z-index: 2; font-weight: 600;
}
thead th:last-child { border-right: none; }
thead th .sub { font-size: 0.65rem; color: #556688; font-weight: 400; display: block; margin-top: 1px; }

tbody tr { transition: background 0.1s; }
tbody tr:hover td { background: #1e2840; }
tbody tr.row-hover td { background: #1e2840 !important; }

td {
  padding: 6px 10px;
  text-align: center;           /* ← 置中 */
  border-bottom: 1px solid #1e2535;
  border-right: 1px solid #1e2a3a;  /* ← 欄位分隔線 */
  color: #ccd6e8;
  white-space: nowrap;
}
td:last-child { border-right: none; }
td:first-child { color: #6677aa; font-size: 0.77rem; }
td.range-cell { color: #8899bb; font-size: 0.79rem; }

tbody tr.sum-row td { color: #7ef7a0; background: #1a2e1a; font-weight: 700; }
tbody tr.sum-row:hover td { background: #1a2e1a !important; }
tbody tr.sum-row { border-top: 2px solid #3a6b3a; }

/* ── Respin Input ────────────────────────── */
td.respin-cell { padding: 3px 6px; }
.respin-wrap { display: flex; align-items: center; gap: 4px; justify-content: center; }
.respin-input {
  background: #0d1320;
  border: 1.5px solid #3a5a8b;
  border-radius: 5px;
  color: #e0f0ff;
  text-align: center;
  width: 72px;
  font-size: 0.82rem;
  font-family: inherit;
  padding: 4px 6px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.respin-input:focus {
  border-color: #7eb8f7;
  box-shadow: 0 0 0 2px rgba(126,184,247,0.15);
}
.respin-input:disabled {
  opacity: 0.4; cursor: not-allowed;
  border-color: #2a3550; background: #111722;
}
.lock-btn {
  background: none; border: none;
  cursor: pointer; padding: 1px 2px;
  font-size: 0.83rem; border-radius: 4px;
  transition: background 0.15s;
}
.lock-btn:hover { background: #2a3550; }

td.cell-changed { background: #282510 !important; color: #ffe066 !important; }
td.cell-grval   { color: #5ef77a !important; font-weight: 700; }

/* Arrow indicator */
.arrow-up   { color: #5ef77a; font-size: 0.85rem; margin-right: 3px; }
.arrow-down { color: #f77e5e; font-size: 0.85rem; margin-right: 3px; }

/* ── Control ─────────────────────────────── */
.ctrl-body { padding: 13px 16px; }
.ctrl-row  { display: flex; align-items: flex-end; gap: 11px; flex-wrap: wrap; }
.input-group { display: flex; flex-direction: column; gap: 4px; }
.input-group label { font-size: 0.75rem; color: #8899aa; }
.input-group input[type=number] {
  background: #0f1117; border: 1px solid #3a4a6b;
  color: #e0e0e0; border-radius: 7px;
  padding: 7px 12px; font-size: 0.93rem; width: 145px;
  outline: none; transition: border-color 0.15s;
}
.input-group input[type=number]:focus { border-color: #7eb8f7; }
.btn {
  border: none; border-radius: 7px;
  padding: 8px 18px; font-size: 0.86rem; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s, transform 0.1s;
}
.btn:active { transform: translateY(1px); }
.btn:hover  { opacity: 0.86; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-run   { background: linear-gradient(135deg, #3a7bd5, #2060b0); color: #fff; }
.btn-reset { background: #263352; color: #aab8cc; border: 1px solid #3a4a6b; }
.btn-dl    { background: linear-gradient(135deg, #2e7d52, #1a5c3a); color: #fff; }

.status-msg { margin-top: 11px; padding: 7px 12px; border-radius: 7px; font-size: 0.83rem; display: none; }
.status-msg.success { background: #1a2e1a; color: #7ef7a0; border: 1px solid #2a4a2a; display: block; }
.status-msg.error   { background: #2e1a1a; color: #f77e7e; border: 1px solid #4a2a2a; display: block; }
.status-msg.info    { background: #1a2235; color: #7eb8f7; border: 1px solid #2a3a5a; display: block; }

.result-wrap { overflow-x: auto; max-height: 420px; overflow-y: auto; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #161b27; }
::-webkit-scrollbar-thumb { background: #3a4a6b; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #4a5a8b; }

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ── Top Bar ─────────────────────────────── -->
<div class="top-bar">
  <div id="upload-area">
    <div class="up-icon">📂</div>
    <p>拖放 <span>.xlsx</span> 或<span> 點擊上傳</span></p>
    <div id="file-name">尚未載入</div>
    <input type="file" id="file-input" accept=".xlsx,.xls">
  </div>

  <div class="gr-display">
    <div class="gr-block">
      <span class="glabel">原始 GR</span>
      <span class="gvalue dim" id="gr-original">—</span>
    </div>
    <div class="gr-sep"></div>
    <div class="gr-block">
      <span class="glabel">目標 GR</span>
      <span class="gvalue dim" id="gr-target">—</span>
    </div>
    <div class="gr-sep"></div>
    <div class="gr-block">
      <span class="glabel">調整後 GR</span>
      <span class="gvalue dim" id="gr-result">—</span>
    </div>
    <div class="gr-sep"></div>
    <div class="gr-detail" id="gr-detail" style="display:none">
      <div class="drow"><span class="dk">誤差</span><span class="dv" id="det-err">—</span></div>
      <div class="drow"><span class="dk">狀態</span><span class="dv" id="det-status">—</span></div>
      <div class="drow"><span class="dk">變更列</span><span class="dv" id="det-changed">—</span></div>
    </div>
  </div>
</div>

<!-- ── Raw Table Card ─────────────────────── -->
<div class="card" id="raw-card" style="display:none">
  <div class="card-header" id="raw-hdr">
    <div style="display:flex;align-items:center">
      <h2>原始表格</h2>
      <span class="badge" id="row-badge">—</span>
    </div>
    <button class="collapse-btn" id="raw-btn">收合 ▲</button>
  </div>
  <div class="card-body" id="raw-body">
    <div class="split-wrap">
      <!-- Left pane -->
      <div class="split-pane" id="left-pane">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>倍率下限<span class="sub">range min</span></th>
              <th>倍率上限<span class="sub">range max</span></th>
              <th>平均倍率<span class="sub">avg mult</span></th>
              <th>機率<span class="sub">prob</span></th>
            </tr>
          </thead>
          <tbody id="left-tbody"></tbody>
        </table>
      </div>
      <!-- Right pane -->
      <div class="split-pane" id="right-pane">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>倍率下限<span class="sub">range min</span></th>
              <th>倍率上限<span class="sub">range max</span></th>
              <th>重轉機率 ×10⁴<span class="sub">respin — 可調整</span></th>
              <th>GR<span class="sub">prob×(1-respin)×avg / Σ</span></th>
            </tr>
          </thead>
          <tbody id="right-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ── Control Card ───────────────────────── -->
<div class="card" id="ctrl-card" style="display:none">
  <div class="card-header" style="cursor:default">
    <h2>調整控制</h2>
  </div>
  <div class="ctrl-body">
    <div class="ctrl-row">
      <div class="input-group">
        <label>目標 GR 值（百分比，例：97）</label>
        <input type="number" id="target-input" placeholder="例：97" step="0.01" min="0">
      </div>
      <button class="btn btn-run"   onclick="runOptimize()">▶ 執行調整</button>
      <button class="btn btn-reset" onclick="resetRespin()">↺ 還原重轉機率</button>
      <button class="btn btn-dl hidden" id="dl-btn" onclick="downloadExcel()">⬇ 下載 Excel</button>
    </div>
    <div class="status-msg" id="status-msg"></div>
  </div>
</div>

<!-- ── Result Card ─────────────────────────── -->
<div class="card" id="result-card" style="display:none">
  <div class="card-header" id="result-hdr">
    <div style="display:flex;align-items:center">
      <h2>調整結果</h2>
      <span class="badge" id="changed-badge">—</span>
    </div>
    <button class="collapse-btn" id="result-btn">收合 ▲</button>
  </div>
  <div class="card-body" id="result-body">
    <div class="result-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>倍率下限</th>
            <th>倍率上限</th>
            <th>平均倍率</th>
            <th>機率</th>
            <th>重轉原始 ×10⁴</th>
            <th>重轉調整後 ×10⁴</th>
            <th>GR</th>
          </tr>
        </thead>
        <tbody id="result-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════
// Constants
// ═══════════════════════════════════════════════
const R_MIN = 1e-9;           // respin 調整下限（>0）
const R_MAX = 1 - 1e-9;       // respin 調整上限（<1）

// ═══════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════
let rows       = [];   // [{rowIdx, rangeMin, rangeMax, avg, prob, respin, locked}]
let backupR    = [];   // original respin values (from Excel)
let originalGR = 0;   // GR computed from backupR — fixed after load
let wb         = null;
let fileName   = '';

// ═══════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════
const clip  = (v, lo = 0, hi = 1) => Math.max(lo, Math.min(hi, v));
const fmt   = (v, d = 4) => Number(v).toFixed(d);   // 4 decimal places for display
const fmtE  = (v, d = 3) => Number(v).toExponential(d);
const fmtPct = v => (Number(v) * 100).toFixed(2) + '%';  // percentage display
const toX4  = v => Math.round(Number(v) * 10000);         // respin → ×10000 integer

function calcGR19(arr) {
  let num = 0, den = 0;
  arr.forEach(r => {
    const w = r.prob * (1 - r.respin);
    num += w * r.avg;
    den += w;
  });
  return den === 0 ? 0 : num / den;
}

function calcGR(r, denom) {
  return denom > 0 ? r.prob * (1 - r.respin) * r.avg / denom : 0;
}

function getDenom(arr) {
  return arr.reduce((s, r) => s + r.prob * (1 - r.respin), 0);
}

// ═══════════════════════════════════════════════
// Upload / Parse
// ═══════════════════════════════════════════════
const uploadEl  = document.getElementById('upload-area');
const fileInput = document.getElementById('file-input');

uploadEl.addEventListener('click', () => fileInput.click());
uploadEl.addEventListener('dragover', e => { e.preventDefault(); uploadEl.classList.add('drag-over'); });
uploadEl.addEventListener('dragleave', () => uploadEl.classList.remove('drag-over'));
uploadEl.addEventListener('drop', e => {
  e.preventDefault(); uploadEl.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

function loadFile(file) {
  fileName = file.name;
  document.getElementById('file-name').textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      wb = XLSX.read(ev.target.result, { type: 'array' });
      parseSheet();
    } catch (err) {
      setStatus('讀取 Excel 失敗：' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseSheet() {
  const ws  = wb.Sheets[wb.SheetNames[0]];
  const ref = XLSX.utils.decode_range(ws['!ref']);

  rows = [];
  for (let r = 0; r <= ref.e.r; r++) {
    const getV = c => {
      const cell = ws[XLSX.utils.encode_cell({ r, c })];
      if (!cell) return null;
      if (cell.t === 's') return 'TEXT';
      return typeof cell.v === 'number' ? cell.v : null;
    };
    const a = getV(0), b = getV(1), c = getV(2), d = getV(3), e = getV(4);
    if (a === 'TEXT' || b === 'TEXT' || c === 'TEXT' || d === 'TEXT' || e === 'TEXT') continue;
    if (a === null && b === null && c === null && d === null && e === null) continue;
    const safeN = v => (v === null || isNaN(+v)) ? 0 : +v;
    rows.push({ rowIdx: r+1, rangeMin: safeN(a), rangeMax: safeN(b),
                avg: safeN(c), prob: safeN(d), respin: safeN(e), locked: false });
  }

  // Drop trailing zero-padding rows
  while (rows.length > 0) {
    const last = rows[rows.length - 1];
    if (last.avg === 0 && last.prob === 0 && last.respin === 0) rows.pop(); else break;
  }

  if (rows.length === 0) { setStatus('找不到有效資料列，請確認 Excel 格式。', 'error'); return; }

  backupR    = rows.map(r => r.respin);
  originalGR = calcGR19(rows);   // fixed reference GR

  // Auto-lock rows where respin = 0 or 1
  rows.forEach(r => { if (r.respin === 0 || r.respin === 1) r.locked = true; });

  document.getElementById('row-badge').textContent = rows.length + ' 列';
  renderTables();

  document.getElementById('raw-card').style.display    = '';
  document.getElementById('ctrl-card').style.display   = '';
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('dl-btn').classList.add('hidden');

  // Show original GR (fixed)
  const origEl = document.getElementById('gr-original');
  origEl.textContent = fmtPct(originalGR);
  origEl.className   = 'gvalue neutral';
  // Clear target / result
  document.getElementById('gr-target').textContent = '—';
  document.getElementById('gr-target').className   = 'gvalue dim';
  document.getElementById('gr-result').textContent = '—';
  document.getElementById('gr-result').className   = 'gvalue dim';
  document.getElementById('gr-detail').style.display = 'none';

  clearStatus();
}

// ═══════════════════════════════════════════════
// Render Tables
// ═══════════════════════════════════════════════
function renderTables() {
  const denom  = getDenom(rows);
  const ltbody = document.getElementById('left-tbody');
  const rtbody = document.getElementById('right-tbody');
  ltbody.innerHTML = '';
  rtbody.innerHTML = '';

  rows.forEach((row, idx) => {
    const gr = calcGR(row, denom);

    // Left row
    const ltr = document.createElement('tr');
    ltr.id = 'ltr-' + idx;
    ltr.innerHTML = `
      <td>${row.rowIdx}</td>
      <td class="range-cell">${row.rangeMin}</td>
      <td class="range-cell">${row.rangeMax}</td>
      <td>${fmt(row.avg)}</td>
      <td>${fmt(row.prob)}</td>
    `;
    addHoverSync(ltr, idx);
    ltbody.appendChild(ltr);

    // Right row — respin displayed as ×10000 integer
    const rtr = document.createElement('tr');
    rtr.id = 'rtr-' + idx;
    rtr.innerHTML = `
      <td>${row.rowIdx}</td>
      <td class="range-cell">${row.rangeMin}</td>
      <td class="range-cell">${row.rangeMax}</td>
      <td class="respin-cell">
        <div class="respin-wrap">
          <input class="respin-input" id="ri-${idx}" type="number"
            value="${toX4(row.respin)}" step="1" min="1" max="9999"
            onchange="onRespinChange(${idx}, this.value)"
            title="重轉機率（×10000），範圍 1~9999">
          <button class="lock-btn" id="lb-${idx}"
            onclick="toggleLock(${idx})"
            title="鎖定後不被演算法調整">🔓</button>
        </div>
      </td>
      <td id="grval-${idx}">${fmt(gr)}</td>
    `;
    addHoverSync(rtr, idx);
    rtbody.appendChild(rtr);

    // Apply initial lock state
    if (row.locked) applyLockUI(idx, true, rtr);
  });

  appendSumRowLeft(ltbody);
  appendSumRowRight(rtbody);
}

function applyLockUI(idx, locked, trEl) {
  const inp = trEl ? trEl.querySelector('#ri-' + idx) : document.getElementById('ri-' + idx);
  const btn = trEl ? trEl.querySelector('#lb-' + idx) : document.getElementById('lb-' + idx);
  if (locked) {
    if (inp) inp.disabled = true;
    if (btn) { btn.textContent = '🔒'; btn.style.color = '#f7a07e'; btn.title = '此列已鎖定，演算法不會調整其重轉機率'; }
  } else {
    if (inp) inp.disabled = false;
    if (btn) { btn.textContent = '🔓'; btn.style.color = ''; btn.title = '鎖定後不被演算法調整'; }
  }
}

function addHoverSync(tr, idx) {
  tr.addEventListener('mouseenter', () => {
    document.getElementById('ltr-' + idx)?.classList.add('row-hover');
    document.getElementById('rtr-' + idx)?.classList.add('row-hover');
  });
  tr.addEventListener('mouseleave', () => {
    document.getElementById('ltr-' + idx)?.classList.remove('row-hover');
    document.getElementById('rtr-' + idx)?.classList.remove('row-hover');
  });
}

function appendSumRowLeft(tbody) {
  const tr = document.createElement('tr');
  tr.className = 'sum-row';
  tr.innerHTML = `<td>Σ</td><td>—</td><td>—</td><td>—</td>
    <td id="sum-prob">${fmt(rows.reduce((s,r) => s+r.prob, 0))}</td>`;
  tbody.appendChild(tr);
}

function appendSumRowRight(tbody) {
  const gr19 = calcGR19(rows);
  const tr   = document.createElement('tr');
  tr.className = 'sum-row';
  tr.innerHTML = `<td>Σ</td><td>—</td><td>—</td><td>—</td>
    <td id="sum-gr19" class="cell-grval">${fmt(gr19)}</td>`;
  tbody.appendChild(tr);
}

function refreshRightColumn() {
  const denom = getDenom(rows);
  rows.forEach((row, idx) => {
    const el = document.getElementById('grval-' + idx);
    if (el) el.textContent = fmt(calcGR(row, denom));
  });
  const gr19 = calcGR19(rows);
  const el2  = document.getElementById('sum-gr19');
  if (el2) el2.textContent = fmt(gr19);
  // NOTE: do NOT update gr-original here — it's fixed after load
}

function onRespinChange(idx, val) {
  const x4 = parseFloat(val);
  if (isNaN(x4) || x4 <= 0 || x4 >= 10000) {
    setStatus('重轉機率（×10000）必須在 1 ~ 9999 之間（不含 0 和 10000）', 'error');
    // Restore input to previous value
    const inp = document.getElementById('ri-' + idx);
    if (inp) inp.value = toX4(rows[idx].respin);
    return;
  }
  rows[idx].respin = x4 / 10000;
  clearStatus();
  refreshRightColumn();
}

function toggleLock(idx) {
  rows[idx].locked = !rows[idx].locked;
  applyLockUI(idx, rows[idx].locked, null);
}

// ═══════════════════════════════════════════════
// Collapse
// ═══════════════════════════════════════════════
function makeCollapsible(hId, bId, btnId) {
  document.getElementById(hId).addEventListener('click', () => {
    const b   = document.getElementById(bId);
    const btn = document.getElementById(btnId);
    b.classList.toggle('collapsed');
    btn.textContent = b.classList.contains('collapsed') ? '展開 ▼' : '收合 ▲';
  });
}
makeCollapsible('raw-hdr',    'raw-body',    'raw-btn');
makeCollapsible('result-hdr', 'result-body', 'result-btn');

// Left / right panes scroll INDEPENDENTLY (no sync)

// ═══════════════════════════════════════════════
// Silent Reset (used internally before optimize)
// ═══════════════════════════════════════════════
function _silentReset() {
  rows.forEach((r, i) => { r.respin = backupR[i]; });
  rows.forEach((r, i) => {
    const inp = document.getElementById('ri-' + i);
    if (inp) inp.value = toX4(backupR[i]);
  });
  refreshRightColumn();
}

// ═══════════════════════════════════════════════
// Optimizer — Binary Search on Δ
// ═══════════════════════════════════════════════
function runOptimize() {
  // Auto-restore to original respin values first
  _silentReset();

  // Target input is in percentage (e.g. 97 means 0.97)
  const targetPct = parseFloat(document.getElementById('target-input').value);
  if (isNaN(targetPct) || targetPct <= 0) {
    setStatus('請輸入有效的目標 GR 值（百分比，如 97 表示 97%）', 'error'); return;
  }
  const target = targetPct / 100;

  const unlocked = rows.filter(r => !r.locked);
  if (unlocked.length === 0) {
    setStatus('所有列都已鎖定，無法調整。請解鎖至少一列。', 'error'); return;
  }

  const baseR = rows.map(r => r.respin);

  function gr19ofD(d) {
    const snap = rows.map((r, i) => ({
      avg: r.avg, prob: r.prob,
      respin: r.locked ? baseR[i] : clip(baseR[i] + d, R_MIN, R_MAX),
    }));
    return calcGR19(snap);
  }

  const gP1 = gr19ofD( 1.0);
  const gM1 = gr19ofD(-1.0);
  const gLo = Math.min(gP1, gM1);
  const gHi = Math.max(gP1, gM1);

  if (target < gLo - 1e-9 || target > gHi + 1e-9) {
    setStatus(
      `目標 ${fmtPct(target)} 超出可調整範圍 [${fmtPct(gLo)}, ${fmtPct(gHi)}]。` +
      `目前 GR = ${fmtPct(gr19ofD(0))}`,
      'error'
    );
    return;
  }

  const decreasing = gM1 >= gP1;
  let lo = -1.0, hi = 1.0, delta = 0;

  for (let i = 0; i < 300; i++) {
    const mid = (lo + hi) / 2;
    const g   = gr19ofD(mid);
    if (Math.abs(g - target) < 1e-12) { delta = mid; break; }
    if (decreasing ? g > target : g < target) lo = mid;
    else hi = mid;
    delta = mid;
    if (Math.abs(hi - lo) < 1e-13) break;
  }

  const newR    = rows.map((r, i) => r.locked ? baseR[i] : clip(baseR[i] + delta, R_MIN, R_MAX));
  const gr19New = calcGR19(rows.map((r, i) => ({ avg: r.avg, prob: r.prob, respin: newR[i] })));
  const err     = Math.abs(gr19New - target);

  showResult(baseR, newR, target, gr19New, err);
}

// ═══════════════════════════════════════════════
// Result
// ═══════════════════════════════════════════════
function showResult(baseR, newR, target, gr19New, err) {
  const ok = err < 1e-4;

  // Update top display: target and result only (original stays fixed)
  const tgtEl = document.getElementById('gr-target');
  tgtEl.textContent = fmtPct(target);
  tgtEl.className   = 'gvalue neutral';

  const resEl = document.getElementById('gr-result');
  resEl.textContent = fmtPct(gr19New);
  resEl.className   = 'gvalue ' + (ok ? 'good' : 'neutral');

  const detEl = document.getElementById('gr-detail');
  detEl.style.display = '';
  document.getElementById('det-err').textContent    = fmtE(err);
  document.getElementById('det-err').className      = 'dv ' + (ok ? 'hi' : '');
  document.getElementById('det-status').textContent = ok ? '✔ 收斂' : '⚠ 未收斂';
  document.getElementById('det-status').className   = 'dv ' + (ok ? 'hi' : '');

  // Result table
  const adjRows = rows.map((r, i) => ({ ...r, respin: newR[i] }));
  const denom   = getDenom(adjRows);
  const tbody   = document.getElementById('result-tbody');
  tbody.innerHTML = '';
  let changed = 0;

  adjRows.forEach((row, idx) => {
    const isChanged = Math.abs(newR[idx] - baseR[idx]) > 1e-10;
    if (isChanged) changed++;
    const gr = calcGR(row, denom);

    // Arrow indicator
    let arrow = '';
    if (isChanged) {
      if (newR[idx] > baseR[idx]) arrow = '<span class="arrow-up">↑</span>';
      else                         arrow = '<span class="arrow-down">↓</span>';
    }

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.rowIdx}</td>
      <td class="range-cell">${row.rangeMin}</td>
      <td class="range-cell">${row.rangeMax}</td>
      <td>${fmt(row.avg)}</td>
      <td>${fmt(row.prob)}</td>
      <td>${toX4(baseR[idx])}</td>
      <td class="${isChanged ? 'cell-changed' : ''}">${arrow}${toX4(newR[idx])}</td>
      <td>${fmt(gr)}</td>
    `;
    tbody.appendChild(tr);
  });

  // Sum row
  const sumProb = adjRows.reduce((s, r) => s + r.prob, 0);
  const trS = document.createElement('tr');
  trS.className = 'sum-row';
  trS.innerHTML = `
    <td>Σ</td><td>—</td><td>—</td><td>—</td>
    <td>${fmt(sumProb)}</td><td>—</td><td>—</td>
    <td class="cell-grval">${fmt(gr19New)}</td>
  `;
  tbody.appendChild(trS);

  document.getElementById('changed-badge').textContent = changed + ' 列變更';
  document.getElementById('det-changed').textContent   = changed + ' 列';
  document.getElementById('result-card').style.display = '';
  document.getElementById('dl-btn').classList.remove('hidden');

  setStatus(
    `調整完成！GR = ${fmtPct(gr19New)}，目標 = ${fmtPct(target)}，誤差 = ${fmtE(err)}`,
    ok ? 'success' : 'info'
  );

  // Persist adjusted respin into rows & sync UI
  rows.forEach((r, i) => { r.respin = newR[i]; });
  rows.forEach((r, i) => {
    const inp = document.getElementById('ri-' + i);
    if (inp) inp.value = toX4(r.respin);
  });
  refreshRightColumn();

  document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ═══════════════════════════════════════════════
// Reset (manual button)
// ═══════════════════════════════════════════════
function resetRespin() {
  if (backupR.length === 0) { setStatus('尚無備份可還原。', 'info'); return; }
  _silentReset();
  document.getElementById('gr-target').textContent = '—';
  document.getElementById('gr-target').className   = 'gvalue dim';
  document.getElementById('gr-result').textContent = '—';
  document.getElementById('gr-result').className   = 'gvalue dim';
  document.getElementById('gr-detail').style.display = 'none';
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('dl-btn').classList.add('hidden');
  setStatus('重轉機率已還原至原始數值。', 'info');
}

// ═══════════════════════════════════════════════
// Download
// ═══════════════════════════════════════════════
function downloadExcel() {
  if (!wb) return;
  const ws = wb.Sheets[wb.SheetNames[0]];
  rows.forEach(row => {
    const addr = XLSX.utils.encode_cell({ r: row.rowIdx - 1, c: 4 });
    if (ws[addr]) { ws[addr].v = row.respin; ws[addr].t = 'n'; delete ws[addr].f; }
    else ws[addr] = { v: row.respin, t: 'n' };
  });
  const outName = fileName.replace(/\.xlsx?$/i, '') + '_adjusted.xlsx';
  XLSX.writeFile(wb, outName);
  setStatus('已下載：' + outName, 'success');
}

// ═══════════════════════════════════════════════
// Status
// ═══════════════════════════════════════════════
function setStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className   = 'status-msg ' + type;
}
function clearStatus() {
  const el = document.getElementById('status-msg');
  el.className = 'status-msg'; el.textContent = '';
}
