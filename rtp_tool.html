<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTP Respin 調整工具</title>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
  background: #0f1117;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 18px 22px;
}

/* ── Light theme ──────────────────────────── */
body[data-theme="light"] { background: #f5f6fb; color: #111827; }
body[data-theme="light"] td { color: #111827; }
body[data-theme="light"] .card { background: #ffffff; border-color: #d0d4e5; }
body[data-theme="light"] .card-header { background: #e5e7f3; border-bottom-color: #d0d4e5; }
body[data-theme="light"] .card-header h2 { color: #111827; }
body[data-theme="light"] #upload-area { background: #ffffff; border-color: #c4c9dd; }
body[data-theme="light"] .gr-display { background: #ffffff; border-color: #d0d4e5; }
body[data-theme="light"] thead th { background: #e5e7f3; color: #1f2937; border-bottom-color: #c4c9dd; }
body[data-theme="light"] tbody tr:hover td { background: #eef2ff; }
body[data-theme="light"] tbody tr.sum-row td { background: #e6ffed; color: #047857; }
body[data-theme="light"] .status-msg.success { background: #e6ffed; color: #047857; border-color: #86efac; }
body[data-theme="light"] .status-msg.error   { background: #fee2e2; color: #b91c1c; border-color: #fecaca; }
body[data-theme="light"] .status-msg.info    { background: #e0ecff; color: #1d4ed8; border-color: #bfdbfe; }
body[data-theme="light"] .respin-input { background: #f3f4ff; border-color: #9ca3c7; color: #111827; }
body[data-theme="light"] .seg-ctrl { border-left-color: #d0d4e5; }
body[data-theme="light"] .gr-detail .dk,
body[data-theme="light"] .gr-detail .dv { color: #111827; }
body[data-theme="light"] .gvalue.neutral,
body[data-theme="light"] .gvalue.dim { color: #111827; }
body[data-theme="light"] .input-group input[type=number] {
  background: #f3f4ff; border-color: #9ca3c7; color: #111827;
}
body[data-theme="light"] .cycle-tag { color: #374151; }

/* ── Top Bar ──────────────────────────────── */
.top-bar {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 14px;
  margin-bottom: 14px;
  align-items: stretch;
}

#upload-area {
  border: 2px dashed #3a4a6b;
  border-radius: 10px;
  padding: 12px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: #161b27;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
#upload-area:hover, #upload-area.drag-over { border-color: #7eb8f7; background: #1a2235; }
#upload-area .up-icon { font-size: 1.5rem; }
#upload-area p { color: #8899aa; font-size: 0.8rem; }
#upload-area p span { color: #7eb8f7; font-weight: 600; }
#file-name { font-size: 0.73rem; color: #5566aa; margin-top: 1px; }
#file-input { display: none; }

/* ── GR Display ──────────────────────────── */
.gr-display {
  background: #161b27;
  border: 1px solid #2a3550;
  border-radius: 10px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}
.gr-block { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.gr-block .glabel {
  font-size: 0.72rem; color: #8899aa;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.gr-block .gvalue {
  font-size: 2.1rem; font-weight: 800;
  letter-spacing: 1px; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.gvalue.good    { color: #5ef77a; }
.gvalue.neutral { color: #7eb8f7; }
.gvalue.dim     { color: #445566; }
.gr-sep { width: 1px; height: 46px; background: #2a3550; flex-shrink: 0; }
#seg-gr-blocks { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }

.top-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-theme {
  border: 1px solid #3a4a6b;
  background: #263352;
  color: #aab8cc;
  border-radius: 999px;
  padding: 4px 12px;
  font-size: 0.78rem;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s, transform 0.1s;
}
.btn-theme:hover { background: #324067; opacity: 0.9; }
.btn-theme:active { transform: translateY(1px); }

/* ── Card ────────────────────────────────── */
.card {
  background: #161b27;
  border: 1px solid #2a3550;
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  background: #1c2336; border-bottom: 1px solid #2a3550;
  cursor: pointer; user-select: none;
}
.card-header:hover { background: #212840; }
.card-header h2 { font-size: 0.88rem; font-weight: 600; color: #b0c4de; }
.card-header .badge {
  background: #263352; color: #7eb8f7;
  padding: 1px 8px; border-radius: 20px;
  font-size: 0.73rem; margin-left: 8px;
}
.cycle-tag {
  font-size: 0.78rem; color: #8899aa; margin-left: 10px;
}
.collapse-btn {
  background: none; border: 1px solid #3a4a6b;
  color: #8899aa; border-radius: 5px;
  padding: 2px 8px; cursor: pointer; font-size: 0.78rem;
  transition: all 0.15s;
}
.collapse-btn:hover { background: #263352; color: #ccc; }
.card-body.collapsed { display: none; }

/* ── Segment card layout ─────────────────── */
.seg-body-wrap {
  display: flex;
  align-items: flex-start;
}
.seg-body-wrap .table-wrap {
  flex: 1;
  overflow-x: auto;
}
.seg-ctrl {
  width: 230px;
  min-width: 200px;
  flex-shrink: 0;
  padding: 14px 16px;
  border-left: 1px solid #2a3550;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Tables ──────────────────────────────── */
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }

thead th {
  position: sticky; top: 0;
  background: #1c2336; color: #7eb8f7;
  padding: 9px 10px;
  text-align: center;
  border-bottom: 2px solid #3a4a6b;
  border-right: 1px solid #263352;
  white-space: nowrap; z-index: 2; font-weight: 600;
}
thead th:last-child { border-right: none; }
thead th .sub { font-size: 0.65rem; color: #556688; font-weight: 400; display: block; margin-top: 1px; }

tbody tr { transition: background 0.1s; }
tbody tr:hover td { background: #1e2840; }

td {
  padding: 6px 10px;
  text-align: center;
  border-bottom: 1px solid #1e2535;
  border-right: 1px solid #1e2a3a;
  color: #ccd6e8;
  white-space: nowrap;
}
td:last-child { border-right: none; }
td:first-child { color: #6677aa; font-size: 0.77rem; }
td.range-cell { color: #8899bb; font-size: 0.79rem; }

tbody tr.sum-row td { color: #7ef7a0; background: #1a2e1a; font-weight: 700; }
tbody tr.sum-row:hover td { background: #1a2e1a !important; }
tbody tr.sum-row { border-top: 2px solid #3a6b3a; }

/* ── Respin Input ────────────────────────── */
td.respin-cell { padding: 3px 6px; }
.respin-wrap { display: flex; align-items: center; gap: 4px; justify-content: center; }
.respin-input {
  background: #0d1320;
  border: 1.5px solid #3a5a8b;
  border-radius: 5px;
  color: #e0f0ff;
  text-align: center;
  width: 72px;
  font-size: 0.82rem;
  font-family: inherit;
  padding: 4px 6px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.respin-input:focus {
  border-color: #7eb8f7;
  box-shadow: 0 0 0 2px rgba(126,184,247,0.15);
}
.respin-input:disabled {
  opacity: 0.4; cursor: not-allowed;
  border-color: #2a3550; background: #111722;
}
.lock-btn {
  background: none; border: none;
  cursor: pointer; padding: 1px 2px;
  font-size: 0.83rem; border-radius: 4px;
  transition: background 0.15s;
}
.lock-btn:hover { background: #2a3550; }

td.cell-changed { background: #282510 !important; color: #ffe066 !important; }
td.cell-grval   { color: #5ef77a !important; font-weight: 700; }

.arrow-up   { color: #5ef77a; font-size: 0.85rem; margin-right: 3px; }
.arrow-down { color: #f77e5e; font-size: 0.85rem; margin-right: 3px; }

/* ── Controls (inside seg-ctrl) ─────────── */
.input-group { display: flex; flex-direction: column; gap: 4px; }
.input-group label { font-size: 0.75rem; color: #8899aa; }
.input-group input[type=number] {
  background: #0f1117; border: 1px solid #3a4a6b;
  color: #e0e0e0; border-radius: 7px;
  padding: 7px 12px; font-size: 0.93rem; width: 100%;
  outline: none; transition: border-color 0.15s;
}
.input-group input[type=number]:focus { border-color: #7eb8f7; }

.btn {
  border: none; border-radius: 7px;
  padding: 8px 14px; font-size: 0.86rem; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s, transform 0.1s;
}
.btn:active { transform: translateY(1px); }
.btn:hover  { opacity: 0.86; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-run   { background: linear-gradient(135deg, #3a7bd5, #2060b0); color: #fff; }
.btn-reset { background: #263352; color: #aab8cc; border: 1px solid #3a4a6b; }
.btn-dl    { background: linear-gradient(135deg, #2e7d52, #1a5c3a); color: #fff; }

.seg-ctrl .btn { width: 100%; }

.status-msg { padding: 7px 10px; border-radius: 7px; font-size: 0.81rem; display: none; word-break: break-all; }
.status-msg.success { background: #1a2e1a; color: #7ef7a0; border: 1px solid #2a4a2a; display: block; }
.status-msg.error   { background: #2e1a1a; color: #f77e7e; border: 1px solid #4a2a2a; display: block; }
.status-msg.info    { background: #1a2235; color: #7eb8f7; border: 1px solid #2a3a5a; display: block; }

/* ── Global status / download row ────────── */
#global-status { margin-bottom: 12px; display: none; }
.cycle-input {
  background: #0f1117;
  border: 1px solid #3a4a6b;
  color: #e0e0e0;
  border-radius: 6px;
  padding: 2px 6px;
  font-size: 0.82rem;
  width: 54px;
  outline: none;
  margin-left: 8px;
  text-align: center;
  transition: border-color 0.15s;
}
.cycle-input:focus { border-color: #7eb8f7; }
body[data-theme="light"] .cycle-input {
  background: #f3f4ff; border-color: #9ca3c7; color: #111827;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #161b27; }
::-webkit-scrollbar-thumb { background: #3a4a6b; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #4a5a8b; }

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ── Top Bar ─────────────────────────────── -->
<div class="top-bar">
  <div id="upload-area">
    <div class="up-icon">📂</div>
    <p>拖放 <span>.xlsx</span> 或<span> 點擊上傳</span></p>
    <div id="file-name">尚未載入</div>
    <input type="file" id="file-input" accept=".xlsx,.xls">
  </div>

  <div class="gr-display">
    <div class="gr-block">
      <span class="glabel">Total</span>
      <span class="gvalue dim" id="gr-total">—</span>
    </div>
    <!-- Segment GR blocks injected by JS -->
    <div id="seg-gr-blocks"></div>
    <div class="top-actions">
      <button class="btn btn-dl hidden" id="dl-btn" onclick="downloadExcel()">⬇ 下載 Excel</button>
      <button class="btn-theme" id="theme-toggle" onclick="toggleTheme()">亮色版</button>
    </div>
  </div>
</div>

<!-- ── Global status ──────────────────────── -->
<div class="status-msg" id="global-status"></div>

<!-- ── Segment Cards (rendered by JS) ────── -->
<div id="segments-container"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════
// Constants
// ═══════════════════════════════════════════════
const R_MIN = 1 / 10000;
const R_MAX = 9999 / 10000;

// ═══════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════
// segments: [{ name, cycle, startCol, headers, rows, backupR, originalGR }]
// rows:     [{ rowIdx, rangeMin, rangeMax, avg, prob, respin, locked }]
let segments = [];
let wb        = null;
let fileName  = '';
let currentTheme = 'dark';

// ═══════════════════════════════════════════════
// Pure helpers
// ═══════════════════════════════════════════════
const clip    = (v, lo = 0, hi = 1) => Math.max(lo, Math.min(hi, v));
const fmt     = (v, d = 4) => Number(v).toFixed(d);
const fmtE    = (v, d = 3) => Number(v).toExponential(d);
const fmtPct  = v => (Number(v) * 100).toFixed(2) + '%';
const toX4    = v => Math.round(Number(v) * 10000);

function calcGR19(arr) {
  let num = 0, den = 0;
  arr.forEach(r => {
    const w = r.prob * (1 - r.respin);
    num += w * r.avg;
    den += w;
  });
  return den === 0 ? 0 : num / den;
}

function calcGR(r, denom) {
  return denom > 0 ? r.prob * (1 - r.respin) * r.avg / denom : 0;
}

function getDenom(arr) {
  return arr.reduce((s, r) => s + r.prob * (1 - r.respin), 0);
}

// ═══════════════════════════════════════════════
// Upload
// ═══════════════════════════════════════════════
const uploadEl  = document.getElementById('upload-area');
const fileInput = document.getElementById('file-input');

uploadEl.addEventListener('click', () => fileInput.click());
uploadEl.addEventListener('dragover', e => { e.preventDefault(); uploadEl.classList.add('drag-over'); });
uploadEl.addEventListener('dragleave', () => uploadEl.classList.remove('drag-over'));
uploadEl.addEventListener('drop', e => {
  e.preventDefault(); uploadEl.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

function loadFile(file) {
  fileName = file.name;
  document.getElementById('file-name').textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      wb = XLSX.read(ev.target.result, { type: 'array' });
      parseSheet();
    } catch (err) {
      setGlobalStatus('讀取 Excel 失敗：' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

// ═══════════════════════════════════════════════
// Parse Sheet — multi-segment
// Row 0: segment name cells (string) + cycle in adjacent cell
// Row 1: header labels (5 cols per segment)
// Row 2+: data rows (5 cols per segment)
// ═══════════════════════════════════════════════
function parseSheet() {
  const ws  = wb.Sheets[wb.SheetNames[0]];
  const ref = XLSX.utils.decode_range(ws['!ref']);

  const getCellVal = (r, c) => {
    const cell = ws[XLSX.utils.encode_cell({ r, c })];
    return cell != null ? cell.v : null;
  };
  const getCellStr = (r, c) => {
    const v = getCellVal(r, c);
    return (v != null && v !== '') ? String(v).trim() : null;
  };

  // ── Scan row 0 for segment names (must be string cells) ──
  const segmentMetas = [];
  for (let c = 0; c <= ref.e.c; c++) {
    const cell = ws[XLSX.utils.encode_cell({ r: 0, c })];
    if (!cell || cell.t !== 's') continue;
    const name = String(cell.v).trim();
    if (!name) continue;

    // Cycle: cell to the right (same row), must be a number >= 1
    const cycleVal = getCellVal(0, c + 1);
    const cycle = (typeof cycleVal === 'number' && cycleVal >= 1)
      ? Math.round(cycleVal) : 1;

    // Headers: row 1, cols c to c+4
    const headers = [];
    for (let hc = c; hc < c + 5; hc++) {
      headers.push(getCellStr(1, hc) || '');
    }

    segmentMetas.push({ name, cycle, startCol: c, headers });
  }

  if (segmentMetas.length === 0) {
    setGlobalStatus(
      '找不到有效的表格名稱，請確認 Excel 格式（第一列需含 MG/FG/BG 等表格名稱）。',
      'error'
    );
    return;
  }

  // ── Parse data rows for each segment (row 2 onwards) ──
  const safeN = v => (v == null || isNaN(+v)) ? 0 : +v;
  const newSegments = [];

  segmentMetas.forEach(meta => {
    const sRows = [];
    for (let r = 2; r <= ref.e.r; r++) {
      const c  = meta.startCol;
      const v0 = getCellVal(r, c);
      const v1 = getCellVal(r, c + 1);
      const v2 = getCellVal(r, c + 2);
      const v3 = getCellVal(r, c + 3);
      const v4 = getCellVal(r, c + 4);

      // Skip all-null rows
      if (v0 == null && v1 == null && v2 == null && v3 == null && v4 == null) continue;

      // Skip rows containing string cells (e.g. repeated header rows)
      if (typeof v0 === 'string' || typeof v1 === 'string' ||
          typeof v2 === 'string' || typeof v3 === 'string' || typeof v4 === 'string') continue;

      const avg  = safeN(v2);
      const prob = safeN(v3);
      let respin = safeN(v4);
      // Excel may store respin as raw (0.29) or ×10000 (2900); normalise
      if (respin > 1) respin = respin / 10000;

      sRows.push({
        rowIdx:   r + 1,          // 1-based Excel row number for write-back
        rangeMin: safeN(v0),
        rangeMax: safeN(v1),
        avg,
        prob,
        respin,
        locked:   false,
      });
    }

    // Drop trailing all-zero padding rows
    while (sRows.length > 0) {
      const last = sRows[sRows.length - 1];
      if (last.avg === 0 && last.prob === 0 && last.respin === 0) sRows.pop();
      else break;
    }

    if (sRows.length === 0) return;  // skip empty segments

    const backupR    = sRows.map(r => r.respin);
    const originalGR = calcGR19(sRows);

    // Auto-lock rows where respin is at its extremes
    sRows.forEach(r => { if (r.respin === 0 || r.respin === 1) r.locked = true; });

    newSegments.push({
      name:       meta.name,
      cycle:      meta.cycle,
      startCol:   meta.startCol,
      headers:    meta.headers,
      rows:       sRows,
      backupR,
      originalGR,
    });
  });

  if (newSegments.length === 0) {
    setGlobalStatus('找不到有效資料列，請確認 Excel 格式。', 'error');
    return;
  }

  segments = newSegments;
  clearGlobalStatus();
  renderAllSegments();
  document.getElementById('dl-btn').classList.remove('hidden');
}

// ═══════════════════════════════════════════════
// Render All Segments
// ═══════════════════════════════════════════════
function renderAllSegments() {
  // Build top-bar segment GR blocks
  const segBlocks = document.getElementById('seg-gr-blocks');
  segBlocks.innerHTML = '';
  segments.forEach((seg, si) => {
    const sep = document.createElement('div');
    sep.className = 'gr-sep';
    segBlocks.appendChild(sep);

    const block = document.createElement('div');
    block.className = 'gr-block';
    block.innerHTML = `
      <span class="glabel">${seg.name}</span>
      <span class="gvalue dim" id="gr-seg-${si}">—</span>
    `;
    segBlocks.appendChild(block);
  });

  // Build segment cards
  const container = document.getElementById('segments-container');
  container.innerHTML = '';
  segments.forEach((seg, si) => {
    const card = buildSegmentCard(seg, si);
    container.appendChild(card);
    makeCollapsible(`seg-hdr-${si}`, `seg-body-${si}`, `seg-btn-${si}`);
    renderSegmentRows(si);

    // Update top GR block for this segment
    const gr19  = calcGR19(seg.rows);
    const topEl = document.getElementById(`gr-seg-${si}`);
    if (topEl) { topEl.textContent = fmtPct(gr19 / seg.cycle); topEl.className = 'gvalue neutral'; }
  });

  recalcTotalGR();
}

function buildSegmentCard(seg, si) {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `seg-card-${si}`;

  // Build header cell text from Excel headers (fallback to defaults)
  const h0 = seg.headers[0] || '下限';
  const h1 = seg.headers[1] || '上限';
  const h2 = seg.headers[2] || '平均倍率';
  const h3 = seg.headers[3] || '機率';

  card.innerHTML = `
    <div class="card-header" id="seg-hdr-${si}">
      <div style="display:flex;align-items:center;" onclick="event.stopPropagation()">
        <h2 style="cursor:pointer" onclick="document.getElementById('seg-hdr-${si}').click()">${seg.name}</h2>
        <span class="cycle-tag">週期</span>
        <input class="cycle-input" id="seg-cycle-${si}" type="number"
          value="${seg.cycle}" min="1" step="1"
          title="週期：調整後所有 GR 顯示會除以此值"
          oninput="onCycleChange(${si}, this.value)">
        <span class="cycle-tag">局</span>
        <span class="badge">${seg.rows.length} 列</span>
      </div>
      <button class="collapse-btn" id="seg-btn-${si}">收合 ▲</button>
    </div>
    <div class="card-body" id="seg-body-${si}">
      <div class="seg-body-wrap">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>${h0}</th>
                <th>${h1}</th>
                <th>${h2}</th>
                <th>${h3}</th>
                <th>重轉機率 / 10000<span class="sub">可調整</span></th>
                <th>GR<span class="sub">per cycle</span></th>
              </tr>
            </thead>
            <tbody id="seg-tbody-${si}"></tbody>
          </table>
        </div>
        <div class="seg-ctrl">
          <div class="input-group">
            <label>目標 GR（%）</label>
            <input type="number" id="seg-target-${si}" placeholder="例：97" step="0.01" min="0">
          </div>
          <button class="btn btn-run" onclick="runOptimizeForSegment(${si})">▶ 執行調整</button>
          <button class="btn btn-reset" onclick="resetSegmentRespin(${si})">↺ 還原重轉</button>
          <div class="status-msg" id="seg-status-${si}"></div>
        </div>
      </div>
    </div>
  `;
  return card;
}

// ═══════════════════════════════════════════════
// Render rows for a single segment
// ═══════════════════════════════════════════════
function renderSegmentRows(si) {
  const seg   = segments[si];
  const tbody = document.getElementById(`seg-tbody-${si}`);
  tbody.innerHTML = '';

  const denom = getDenom(seg.rows);
  seg.rows.forEach((row, idx) => {
    const gr = calcGR(row, denom);
    const tr = document.createElement('tr');
    tr.id = `seg-${si}-tr-${idx}`;
    tr.innerHTML = `
      <td>${row.rowIdx}</td>
      <td class="range-cell">${row.rangeMin}</td>
      <td class="range-cell">${row.rangeMax}</td>
      <td>${fmt(row.avg)}</td>
      <td>${fmtPct(row.prob)}</td>
      <td class="respin-cell">
        <div class="respin-wrap">
          <input class="respin-input" id="seg-${si}-ri-${idx}" type="number"
            value="${toX4(row.respin)}" step="1" min="1" max="9999"
            onchange="onRespinChange(${si}, ${idx}, this.value)"
            title="重轉機率（×10000），範圍 1~9999">
          <button class="lock-btn" id="seg-${si}-lb-${idx}"
            onclick="toggleLock(${si}, ${idx})"
            title="鎖定後不被演算法調整">🔓</button>
        </div>
      </td>
      <td id="seg-${si}-grval-${idx}">${fmtPct(gr / seg.cycle)}</td>
    `;
    tbody.appendChild(tr);
    if (row.locked) applyLockUIForSeg(si, idx, true);
  });

  // Sum row
  const gr19    = calcGR19(seg.rows);
  const sumProb = seg.rows.reduce((s, r) => s + r.prob, 0);
  const trS = document.createElement('tr');
  trS.className = 'sum-row';
  trS.innerHTML = `
    <td>Σ</td>
    <td>—</td><td>—</td><td>—</td>
    <td>${fmtPct(sumProb)}</td>
    <td>—</td>
    <td id="seg-${si}-sum-gr" class="cell-grval">${fmtPct(gr19 / seg.cycle)}</td>
  `;
  tbody.appendChild(trS);
}

// ═══════════════════════════════════════════════
// Refresh GR column + top block for one segment
// ═══════════════════════════════════════════════
function refreshSegmentGR(si) {
  const seg   = segments[si];
  const denom = getDenom(seg.rows);

  seg.rows.forEach((row, idx) => {
    const el = document.getElementById(`seg-${si}-grval-${idx}`);
    if (el) el.textContent = fmtPct(calcGR(row, denom) / seg.cycle);
  });

  const gr19  = calcGR19(seg.rows);
  const sumEl = document.getElementById(`seg-${si}-sum-gr`);
  if (sumEl) sumEl.textContent = fmtPct(gr19 / seg.cycle);

  const topEl = document.getElementById(`gr-seg-${si}`);
  if (topEl) { topEl.textContent = fmtPct(gr19 / seg.cycle); topEl.className = 'gvalue neutral'; }

  recalcTotalGR();
}

// ═══════════════════════════════════════════════
// Total GR  (sum of each segment's GR/cycle)
// ═══════════════════════════════════════════════
function recalcTotalGR() {
  let total = 0;
  segments.forEach(seg => { total += calcGR19(seg.rows) / seg.cycle; });
  const el = document.getElementById('gr-total');
  if (el) { el.textContent = fmtPct(total); el.className = 'gvalue neutral'; }
}

// ═══════════════════════════════════════════════
// Respin change & Lock
// ═══════════════════════════════════════════════
function onRespinChange(si, idx, val) {
  const seg = segments[si];
  const x4  = parseFloat(val);
  if (isNaN(x4) || x4 <= 0 || x4 >= 10000) {
    setSegStatus(si, '重轉機率（×10000）必須在 1 ~ 9999 之間（不含 0 和 10000）', 'error');
    const inp = document.getElementById(`seg-${si}-ri-${idx}`);
    if (inp) inp.value = toX4(seg.rows[idx].respin);
    return;
  }
  seg.rows[idx].respin = x4 / 10000;
  refreshSegmentGR(si);
}

function toggleLock(si, idx) {
  const seg = segments[si];
  seg.rows[idx].locked = !seg.rows[idx].locked;
  applyLockUIForSeg(si, idx, seg.rows[idx].locked);
}

function applyLockUIForSeg(si, idx, locked) {
  const inp = document.getElementById(`seg-${si}-ri-${idx}`);
  const btn = document.getElementById(`seg-${si}-lb-${idx}`);
  if (locked) {
    if (inp) inp.disabled = true;
    if (btn) { btn.textContent = '🔒'; btn.style.color = '#f7a07e'; btn.title = '此列已鎖定，演算法不會調整'; }
  } else {
    if (inp) inp.disabled = false;
    if (btn) { btn.textContent = '🔓'; btn.style.color = ''; btn.title = '鎖定後不被演算法調整'; }
  }
}

// ═══════════════════════════════════════════════
// Reset one segment
// ═══════════════════════════════════════════════
function resetSegmentRespin(si) {
  const seg = segments[si];
  seg.rows.forEach((r, i) => { r.respin = seg.backupR[i]; });
  seg.rows.forEach((r, i) => {
    const inp = document.getElementById(`seg-${si}-ri-${i}`);
    if (inp) inp.value = toX4(seg.backupR[i]);
  });
  refreshSegmentGR(si);
  setSegStatus(si, '重轉機率已還原至原始數值。', 'info');
}

// ═══════════════════════════════════════════════
// Cycle change
// ═══════════════════════════════════════════════
function onCycleChange(si, val) {
  let v = parseInt(val, 10);
  if (isNaN(v) || v < 1) v = 1;
  segments[si].cycle = v;
  const inp = document.getElementById(`seg-cycle-${si}`);
  if (inp) inp.value = v;
  refreshSegmentGR(si);
}

// ═══════════════════════════════════════════════
// Collapse
// ═══════════════════════════════════════════════
function makeCollapsible(hId, bId, btnId) {
  const hdr = document.getElementById(hId);
  if (!hdr) return;
  hdr.addEventListener('click', () => {
    const b   = document.getElementById(bId);
    const btn = document.getElementById(btnId);
    b.classList.toggle('collapsed');
    btn.textContent = b.classList.contains('collapsed') ? '展開 ▼' : '收合 ▲';
  });
}

// ═══════════════════════════════════════════════
// Optimizer — Binary Search on Δ (per segment)
// ═══════════════════════════════════════════════
function runOptimizeForSegment(si) {
  const seg = segments[si];

  // Sync cycle from input field — onchange may not have fired if user clicked
  // the button immediately after typing without leaving the field first
  const cycleEl = document.getElementById(`seg-cycle-${si}`);
  if (cycleEl) {
    const v = parseInt(cycleEl.value, 10);
    if (!isNaN(v) && v >= 1) seg.cycle = v;
    else cycleEl.value = seg.cycle;
  }

  // Reset to original respin values before optimising
  seg.rows.forEach((r, i) => { r.respin = seg.backupR[i]; });
  seg.rows.forEach((r, i) => {
    const inp = document.getElementById(`seg-${si}-ri-${i}`);
    if (inp) inp.value = toX4(seg.backupR[i]);
  });

  const targetPct = parseFloat(document.getElementById(`seg-target-${si}`).value);
  if (isNaN(targetPct) || targetPct <= 0) {
    setSegStatus(si, '請輸入有效的目標 GR 值（百分比，如 97 表示 97%）', 'error');
    return;
  }
  // target = 週期總 GR
  const target = (targetPct / 100) * seg.cycle;

  const unlocked = seg.rows.filter(r => !r.locked);
  if (unlocked.length === 0) {
    setSegStatus(si, '所有列都已鎖定，無法調整。請解鎖至少一列。', 'error');
    return;
  }

  const baseR = seg.rows.map(r => r.respin);

  // GR as a function of global delta Δ
  function gr19ofD(d) {
    const snap = seg.rows.map((r, i) => ({
      avg:    r.avg,
      prob:   r.prob,
      respin: r.locked ? baseR[i] : clip(baseR[i] + d, R_MIN, R_MAX),
    }));
    return calcGR19(snap) * seg.cycle;
  }

  // Bracket scan: find the smallest Δ range that brackets target
  const baseG = gr19ofD(0);
  let gMin = baseG, gMax = baseG;
  let bracketLo = 0, bracketHi = 0;
  let foundBracket = false;

  for (let step = 0.01; step <= 1.0; step *= 2) {
    for (const d of [-step, step]) {
      const g = gr19ofD(d);
      if (g < gMin) { gMin = g; bracketLo = d; }
      if (g > gMax) { gMax = g; bracketHi = d; }
    }
    if (target >= gMin - 1e-9 && target <= gMax + 1e-9) { foundBracket = true; break; }
  }

  if (!foundBracket) {
    setSegStatus(si,
      `目標 ${fmtPct(target / seg.cycle)} 超出可調整範圍 ` +
      `[${fmtPct(gMin / seg.cycle)}, ${fmtPct(gMax / seg.cycle)}]。` +
      `目前 GR = ${fmtPct(baseG / seg.cycle)}`,
      'error'
    );
    return;
  }

  const decreasing = gr19ofD(bracketHi) < gr19ofD(bracketLo);
  let lo = bracketLo, hi = bracketHi, delta = 0;

  for (let i = 0; i < 300; i++) {
    const mid = (lo + hi) / 2;
    const g   = gr19ofD(mid);
    if (Math.abs(g - target) < 1e-12) { delta = mid; break; }
    if (decreasing ? g > target : g < target) lo = mid;
    else hi = mid;
    delta = mid;
    if (Math.abs(hi - lo) < 1e-13) break;
  }

  const newR       = seg.rows.map((r, i) => r.locked ? baseR[i] : clip(baseR[i] + delta, R_MIN, R_MAX));
  const gr19New    = calcGR19(seg.rows.map((r, i) => ({ avg: r.avg, prob: r.prob, respin: newR[i] }))) * seg.cycle;
  const err        = Math.abs(gr19New - target);
  const ok         = err < 1e-4;

  // Persist new respin values
  seg.rows.forEach((r, i) => { r.respin = newR[i]; });
  seg.rows.forEach((r, i) => {
    const inp = document.getElementById(`seg-${si}-ri-${i}`);
    if (inp) inp.value = toX4(r.respin);
  });

  refreshSegmentGR(si);

  setSegStatus(si,
    `調整完成！GR = ${fmtPct(gr19New / seg.cycle)}，` +
    `目標 = ${fmtPct(target / seg.cycle)}，誤差 = ${fmtE(err)}`,
    ok ? 'success' : 'info'
  );
}

// ═══════════════════════════════════════════════
// Download Excel
// ═══════════════════════════════════════════════
function downloadExcel() {
  if (!wb) return;
  const ws = wb.Sheets[wb.SheetNames[0]];
  segments.forEach(seg => {
    const respinCol = seg.startCol + 4;  // 5th column of segment = Weight/respin
    seg.rows.forEach(row => {
      const addr = XLSX.utils.encode_cell({ r: row.rowIdx - 1, c: respinCol });
      if (ws[addr]) { ws[addr].v = row.respin; ws[addr].t = 'n'; delete ws[addr].f; }
      else ws[addr] = { v: row.respin, t: 'n' };
    });
  });
  const outName = fileName.replace(/\.xlsx?$/i, '') + '_adjusted.xlsx';
  XLSX.writeFile(wb, outName);
  setGlobalStatus('已下載：' + outName, 'success');
}

// ═══════════════════════════════════════════════
// Status helpers
// ═══════════════════════════════════════════════
function setSegStatus(si, msg, type) {
  const el = document.getElementById(`seg-status-${si}`);
  if (el) { el.textContent = msg; el.className = 'status-msg ' + type; }
}

function setGlobalStatus(msg, type) {
  const el = document.getElementById('global-status');
  if (!el) return;
  el.textContent = msg;
  el.className   = 'status-msg ' + type;
  el.style.display = 'block';
}

function clearGlobalStatus() {
  const el = document.getElementById('global-status');
  if (el) { el.textContent = ''; el.className = 'status-msg'; el.style.display = 'none'; }
}

// ═══════════════════════════════════════════════
// Theme
// ═══════════════════════════════════════════════
function applyTheme(theme) {
  currentTheme = theme;
  document.body.dataset.theme = theme;
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = theme === 'dark' ? '亮色版' : '暗色版';
  try { localStorage.setItem('rtp_theme', theme); } catch (_) {}
}

function initTheme() {
  let theme = 'dark';
  try {
    const saved = localStorage.getItem('rtp_theme');
    if (saved === 'light' || saved === 'dark') theme = saved;
  } catch (_) { theme = 'dark'; }
  applyTheme(theme);
}

function toggleTheme() {
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
}

initTheme();
</script>
